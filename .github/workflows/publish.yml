name: Publish Package

# Publishes to npm + GitHub Packages when:
# - A GitHub Release is published (recommended), or
# - You run this workflow manually (Actions → Publish Package → Run workflow).
# Manual runs use the version already in package.json (npm rejects duplicate versions).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run type checking
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Publish to NPM (Trusted Publishing with NPM_TOKEN fallback)
        run: |
          # Backup original package.json
          cp package.json package.json.backup

          # Project .npmrc must not map @lizard-ui to GitHub Packages, or scoped
          # publishes go to the wrong registry. Temporarily move it aside for npm publish.
          if [ -f .npmrc ]; then
            mv .npmrc .npmrc.publish-backup
          fi
          
          # Function to try publishing with current package.json
          try_publish() {
            local package_name=$(node -p "require('./package.json').name")
            echo "📦 Attempting to publish: $package_name"
            # Always target npmjs.org (Trusted Publishing OIDC + optional NPM_TOKEN)
            if npm publish --registry https://registry.npmjs.org --access public; then
              echo "✅ Successfully published: $package_name"
              return 0
            else
              echo "❌ Failed to publish: $package_name"
              return 1
            fi
          }
          
          # Function to setup token authentication
          setup_token_auth() {
            if [ -n "$NPM_TOKEN" ]; then
              echo "🔑 Setting up NPM_TOKEN authentication..."
              
              # Prefer GitHub-provided NPM_CONFIG_USERCONFIG (set by setup-node) or fallback to ~/.npmrc
              NPM_USER_CONFIG="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
              
              # Ensure directory exists
              mkdir -p "$(dirname "$NPM_USER_CONFIG")"
              
              # Override any existing auth with the provided NPM_TOKEN
              {
                echo "registry=https://registry.npmjs.org/"
                echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
                echo "always-auth=true"
              } > "$NPM_USER_CONFIG"
              
              # Export for npm cli to pick it up
              export NODE_AUTH_TOKEN="$NPM_TOKEN"
              echo "✅ NPM_TOKEN configured at $NPM_USER_CONFIG"
              return 0
            else
              echo "⚠️  NPM_TOKEN not available, skipping token authentication"
              return 1
            fi
          }

          # Rewrite package.json from backup to @github-org/base-name (e.g. @lizard-ui/lizard-ui)
          write_scoped_name_from_backup() {
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json.backup', 'utf8'));
              const owner = process.env.GITHUB_REPOSITORY.split('/')[0];
              const base = pkg.name.replace(/^@[^/]+\//, '');
              pkg.name = \`@\${owner}/\${base}\`;
              pkg.publishConfig = { access: 'public', registry: 'https://registry.npmjs.org' };
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
              console.log('📝 Package name for this attempt:', pkg.name);
            "
          }
          
          PUBLISH_SUCCESS=false
          AUTH_METHOD="Trusted Publishing (OIDC)"
          # require() only parses .json; backup path must be read as JSON explicitly
          ORIGINAL_NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json.backup','utf8')).name")
          echo "🔐 Target name from package.json: $ORIGINAL_NAME (preferred install: npm i $ORIGINAL_NAME)"
          
          # 1) Unscoped: Trusted Publishing (OIDC)
          cp package.json.backup package.json
          if try_publish; then
            PUBLISH_SUCCESS=true
            echo "✅ Published using $AUTH_METHOD"
          else
            # 2) Unscoped: NPM_TOKEN
            echo "⚠️  Trusted Publishing failed, attempting unscoped publish with NPM_TOKEN..."
            if setup_token_auth; then
              AUTH_METHOD="NPM_TOKEN (fallback)"
              cp package.json.backup package.json
              if try_publish; then
                PUBLISH_SUCCESS=true
                echo "✅ Published using $AUTH_METHOD"
              fi
            fi
          fi

          # 3) Scoped fallback: npm does not expose a reliable "name taken" error code — retry as @org/base
          #    (covers squatted unscoped names, org-only tokens, and other unscoped failures)
          if [ "$PUBLISH_SUCCESS" = false ] && [[ "$ORIGINAL_NAME" != @* ]]; then
            GH_ORG=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
            echo "⚠️  Unscoped publish failed — retrying as scoped @${GH_ORG}/${ORIGINAL_NAME} (npm cannot reliably detect “name taken” vs other errors)"
            write_scoped_name_from_backup
            if try_publish; then
              PUBLISH_SUCCESS=true
              echo "✅ Published scoped package using $AUTH_METHOD"
            elif [ -n "$NPM_TOKEN" ]; then
              if setup_token_auth; then
                AUTH_METHOD="NPM_TOKEN (fallback)"
                write_scoped_name_from_backup
                if try_publish; then
                  PUBLISH_SUCCESS=true
                  echo "✅ Published scoped package using $AUTH_METHOD"
                fi
              fi
            fi
          fi

          PUBLISHED_NAME=""
          if [ "$PUBLISH_SUCCESS" = true ]; then
            PUBLISHED_NAME=$(node -p "require('./package.json').name")
          fi
          
          # Always restore original package.json if backup exists
          if [ -f package.json.backup ]; then
            cp package.json.backup package.json
            echo "🔄 Restored original package.json"
          fi
          if [ -f .npmrc.publish-backup ]; then
            mv .npmrc.publish-backup .npmrc
            echo "🔄 Restored .npmrc"
          fi
          
          # Final check
          if [ "$PUBLISH_SUCCESS" = false ]; then
            echo "❌ Failed to publish with all authentication methods"
            echo ""
            echo "🔍 Troubleshooting:"
            echo "1. npm Trusted Publishing: link this GitHub repo under the npm org/user at"
            echo "   https://www.npmjs.com/settings/YOUR_ORG_OR_USER/packages/access (OIDC / GitHub Actions)."
            echo "2. E404: enable Trusted Publishing for this repo, or ensure the npm user/org can create the package name."
            echo "3. E403 with NPM_TOKEN: use an Automation token with publish rights (2FA bypass), or fix org permissions."
            echo "4. Unscoped names (e.g. lizard-ui) must be available on npm and not squatted by another account."
            exit 1
          fi
          
          if [ -n "$PUBLISHED_NAME" ]; then
            echo "💡 Published to npm as: $PUBLISHED_NAME — install: npm install $PUBLISHED_NAME"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Configure package for GitHub
        run: |
          # Create a temporary package.json for GitHub publishing
          cp package.json package.json.backup
          node -e "
            const pkg = require('./package.json');
            const owner = process.env.GITHUB_REPOSITORY.split('/')[0];
            const repoName = process.env.GITHUB_REPOSITORY.split('/')[1];
            
            // Use the repository name for GitHub Packages to avoid URL encoding issues
            pkg.name = \`@\${owner}/\${repoName}\`;
            pkg.publishConfig = {
              registry: 'https://npm.pkg.github.com',
              access: 'public'
            };
            
            console.log(\`📦 Publishing to GitHub Packages as: \${pkg.name}\`);
            console.log(\`🎯 Repository: \${process.env.GITHUB_REPOSITORY}\`);
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package.json
        run: mv package.json.backup package.json
